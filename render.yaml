services:
  - type: web
    name: middle-east-crisis-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        value: https://middle-east-crisis-tracker.onrender.com
      - key: APP_REFRESH_INTERVAL_MINUTES
        value: "15"
      - key: APP_SOURCE_TIMEOUT_SECONDS
        value: "6"
      - key: APP_ENABLE_BACKGROUND_REFRESH
        value: "true"
      - key: APP_RUN_STARTUP_INGESTION
        value: "true"
